<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>London Ready</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@500;600;700&display=swap');
:root{
  --bg:#0b0f1a;
  --navy:#0d1f3c;
  --navy2:#122548;
  --surface:#111827;
  --surface2:#1a2540;
  --border:#1e2d4a;
  --red:#c8102e;
  --red2:#a50d25;
  --gold:#c9a84c;
  --gold2:#e8c96a;
  --white:#f0f4ff;
  --muted:#6b7fa3;
  --text:#dde4f5;
  --r:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;max-width:100%;background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:16px;overflow-x:hidden;-webkit-text-size-adjust:100%;}

/* ── HEADER ── */
.header{
  background:var(--navy);
  border-bottom:2px solid var(--red);
  padding:12px 16px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.logo-wrap{display:flex;align-items:center;gap:8px;}
.logo-flag{font-size:1.3rem;}
.logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;
  color:var(--white);letter-spacing:0.3px;}
.logo span{color:var(--gold);}
.header-badge{font-size:0.65rem;font-weight:600;text-transform:uppercase;letter-spacing:1px;
  color:var(--gold);border:1px solid var(--gold);padding:3px 8px;border-radius:4px;opacity:.8;}

/* ── TABS ── */
.tabs-wrap{overflow-x:auto;scrollbar-width:none;
  background:var(--navy);border-bottom:1px solid var(--border);padding:10px 14px;}
.tabs-wrap::-webkit-scrollbar{display:none;}
.tabs{display:flex;gap:6px;width:max-content;}
.tab{padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);background:transparent;
  color:var(--muted);font-size:0.75rem;font-weight:500;cursor:pointer;white-space:nowrap;
  font-family:'Inter',sans-serif;transition:all .18s;-webkit-tap-highlight-color:transparent;}
.tab.active{border-color:var(--red);color:var(--white);background:var(--red);}
.tab:hover:not(.active){border-color:var(--gold);color:var(--gold);}

/* ── PROGRESS ── */
.prog-wrap{display:flex;align-items:center;gap:10px;padding:10px 16px 0;
  background:var(--navy2);border-bottom:1px solid var(--border);}
.pbar{flex:1;height:3px;background:var(--border);border-radius:99px;overflow:hidden;}
.pbar-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--gold));
  border-radius:99px;transition:width .4s ease;}
.plabel{font-size:0.7rem;color:var(--muted);white-space:nowrap;padding-bottom:10px;}

/* ── CARD ── */
.card-wrap{padding:14px 14px 6px;}
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);overflow:hidden;}

.card-tag{display:flex;align-items:center;gap:6px;padding:10px 14px 0;
  font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

.q-block{padding:10px 14px 14px;}
.block-label{font-size:0.65rem;color:var(--muted);font-weight:600;text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:5px;}
.q-en{font-family:'Space Grotesk',sans-serif;font-size:1.15rem;font-weight:600;
  line-height:1.3;color:var(--white);margin-bottom:4px;}
.q-pt{font-size:0.82rem;color:var(--muted);line-height:1.4;margin-bottom:12px;font-style:italic;}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;
  padding:9px 16px;border-radius:999px;border:1.5px solid var(--border);
  background:transparent;color:var(--text);font-size:0.79rem;font-weight:500;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;}
.btn:active{opacity:.7;}
.btn.audio-q{border-color:var(--border);color:var(--muted);}
.btn.audio-q:hover,.btn.audio-q:active{border-color:var(--gold);color:var(--gold);}

/* ── SELECT ── */
.select-block{border-top:1px solid var(--border);padding:14px;}

.select-wrap{position:relative;margin-bottom:10px;}
.select-wrap select{
  width:100%;background:var(--navy);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 36px 11px 12px;color:var(--text);font-size:0.86rem;font-family:'Inter',sans-serif;
  appearance:none;-webkit-appearance:none;outline:none;cursor:pointer;line-height:1.4;
  transition:border-color .18s;}
.select-wrap select:focus{border-color:var(--gold);}
.select-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:0.85rem;}
.select-wrap option{background:#0d1f3c;color:var(--text);}

.btn.confirm{width:100%;background:var(--red);border:none;color:#fff;
  font-weight:600;margin-bottom:12px;font-size:0.85rem;padding:10px 16px;}
.btn.confirm:hover{background:var(--red2);}
.btn.confirm:disabled{opacity:.35;cursor:not-allowed;}

/* ── RESULT ── */
.result-box{background:var(--surface2);border-radius:10px;padding:12px;
  border:1px solid var(--border);display:none;animation:fadeUp .25s ease;}
.result-box.visible{display:block;}

.r-label{font-size:0.65rem;color:var(--muted);font-weight:600;text-transform:uppercase;
  letter-spacing:.7px;margin-bottom:6px;}
.r-en{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:600;
  color:var(--gold2);line-height:1.4;margin-bottom:4px;}
.r-phonetic{font-size:0.74rem;color:var(--muted);font-style:italic;margin-bottom:10px;
  padding:5px 8px;background:rgba(201,168,76,.07);border-radius:6px;
  border-left:2px solid var(--gold);}
.btn.audio-a{border-color:var(--gold);color:var(--gold);
  background:rgba(201,168,76,.08);font-size:0.79rem;}
.btn.audio-a:hover{background:rgba(201,168,76,.16);}

/* ── NAV ── */
.nav-row{display:flex;gap:8px;padding:8px 14px 18px;}
.btn.prev{flex:0 0 auto;border-color:var(--border);color:var(--muted);}
.btn.prev:hover{border-color:var(--gold);color:var(--gold);}
.btn.next{flex:1;background:var(--navy2);border-color:var(--border);}
.btn.next:hover{border-color:var(--gold);color:var(--gold);}

/* ── DONE ── */
.done-screen{display:none;flex-direction:column;align-items:center;text-align:center;
  padding:50px 24px 40px;}
.done-screen.visible{display:flex;}
.done-emoji{font-size:2.8rem;margin-bottom:14px;}
.done-crown{font-size:1.8rem;margin-bottom:4px;}
.done-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;
  color:var(--white);margin-bottom:8px;}
.done-sub{color:var(--muted);font-size:0.84rem;line-height:1.6;margin-bottom:22px;}
.btn.restart{background:var(--red);border:none;color:#fff;font-weight:600;padding:12px 28px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.speaking{animation:pls .7s ease-in-out infinite alternate;}
@keyframes pls{from{opacity:1}to{opacity:.35}}
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-flag">🇬🇧</div>
    <div class="logo">London<span>Ready</span></div>
  </div>
  <div class="header-badge">English Trainer</div>
</div>

<div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>

<div class="prog-wrap">
  <div class="pbar"><div class="pbar-fill" id="pbarFill" style="width:0%"></div></div>
  <div class="plabel" id="plabel">1 / 10</div>
</div>

<div class="card-wrap" id="cardWrap">
  <div class="card">
    <div class="card-tag">
      <span class="dot" id="tagDot"></span>
      <span id="tagText"></span>
    </div>
    <div class="q-block">
      <div class="block-label">Pergunta</div>
      <div class="q-en" id="qEn"></div>
      <div class="q-pt" id="qPt"></div>
      <button class="btn audio-q" id="btnListenQ" onclick="speak('q')">🔊 Ouvir pergunta</button>
    </div>
    <div class="select-block">
      <div class="block-label" style="margin-bottom:8px;">Como você responderia?</div>
      <div class="select-wrap">
        <select id="answerSelect" onchange="onSelectChange()">
          <option value="">— Escolha sua resposta em português —</option>
        </select>
      </div>
      <button class="btn confirm" id="btnConfirm" onclick="confirmAnswer()" disabled>
        Ver e ouvir em inglês →
      </button>
      <div class="result-box" id="resultBox">
        <div class="r-label">Sua resposta em inglês</div>
        <div class="r-en" id="rEn"></div>
        <div class="r-phonetic" id="rPhonetic"></div>
        <button class="btn audio-a" id="btnListenA" onclick="speak('a')">🔊 Ouvir em inglês</button>
      </div>
    </div>
  </div>
</div>

<div class="nav-row" id="navRow">
  <button class="btn prev" id="btnPrev" onclick="nav(-1)" disabled>← Anterior</button>
  <button class="btn next" id="btnNext" onclick="nav(1)">Próxima →</button>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-crown">👑</div>
  <div class="done-emoji">🎉</div>
  <div class="done-title">Well done!</div>
  <div class="done-sub">Você praticou todas as perguntas deste bloco.<br>Repita ou escolha outro cenário acima.</div>
  <button class="btn restart" onclick="restart()">↩ Repetir este bloco</button>
</div>

const keys = Object.keys(SCENARIOS);
let scene = keys[0], idx = 0, currentAnswer = null;

function init(){
  const el = document.getElementById('tabs');
  el.innerHTML = '';
  keys.forEach(k => {
    const b = document.createElement('button');
    b.className = 'tab' + (k===scene ? ' active' : '');
    b.textContent = SCENARIOS[k].icon + ' ' + SCENARIOS[k].label;
    b.onclick = () => switchScene(k);
    el.appendChild(b);
  });
  render();
}

function switchScene(k){
  scene = k; idx = 0;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', keys[i]===k));
  document.getElementById('doneScreen').classList.remove('visible');
  document.getElementById('cardWrap').style.display = '';
  document.getElementById('navRow').style.display = '';
  render();
}

function render(){
  const s = SCENARIOS[scene], total = s.questions.length, q = s.questions[idx];
  currentAnswer = null;
  document.getElementById('pbarFill').style.width = (idx/total*100) + '%';
  document.getElementById('plabel').textContent = `${idx+1} / ${total}`;
  document.getElementById('tagDot').style.background = s.color;
  const tt = document.getElementById('tagText');
  tt.textContent = s.icon + ' ' + s.label; tt.style.color = s.color;
  document.getElementById('qEn').textContent = q.q;
  document.getElementById('qPt').textContent = q.pt;
  const sel = document.getElementById('answerSelect');
  sel.innerHTML = '<option value="">— Escolha como você responderia —</option>';
  q.answers.forEach((a, i) => {
    const opt = document.createElement('option');
    opt.value = i;
    opt.textContent = a.pt;
    sel.appendChild(opt);
  });
  document.getElementById('resultBox').classList.remove('visible');
  document.getElementById('btnConfirm').disabled = true;
  document.getElementById('rEn').textContent = '';
  document.getElementById('rPhonetic').textContent = '';
  document.getElementById('btnPrev').disabled = idx === 0;
  document.getElementById('btnNext').textContent = idx === total-1 ? 'Finalizar ✓' : 'Próxima →';
}

function onSelectChange(){
  const sel = document.getElementById('answerSelect');
  document.getElementById('btnConfirm').disabled = sel.value === '';
  document.getElementById('resultBox').classList.remove('visible');
  currentAnswer = null;
}

function confirmAnswer(){
  const sel = document.getElementById('answerSelect');
  const q = SCENARIOS[scene].questions[idx];
  const a = q.answers[parseInt(sel.value)];
  currentAnswer = a;
  document.getElementById('rEn').textContent = a.en;
  document.getElementById('rPhonetic').textContent = '🔤 ' + a.ph;
  document.getElementById('resultBox').classList.add('visible');
  setTimeout(() => speak('a'), 300);
}

function nav(dir){
  stopSpeech();
  const total = SCENARIOS[scene].questions.length;
  const next = idx + dir;
  if(next >= total){ showDone(); return; }
  if(next < 0) return;
  idx = next; render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function showDone(){
  document.getElementById('cardWrap').style.display = 'none';
  document.getElementById('navRow').style.display = 'none';
  document.getElementById('doneScreen').classList.add('visible');
  document.getElementById('pbarFill').style.width = '100%';
  document.getElementById('plabel').textContent = '✓ Completo';
}

function restart(){
  idx = 0;
  document.getElementById('doneScreen').classList.remove('visible');
  document.getElementById('cardWrap').style.display = '';
  document.getElementById('navRow').style.display = '';
  render();
}

function stopSpeech(){
  if('speechSynthesis' in window) window.speechSynthesis.cancel();
  document.querySelectorAll('.speaking').forEach(el => el.classList.remove('speaking'));
}

function speak(type){
  if(!('speechSynthesis' in window)){ alert('Use o Chrome para ouvir o áudio.'); return; }
  let text = '', btnId = '';
  if(type==='q'){ text = SCENARIOS[scene].questions[idx].q; btnId = 'btnListenQ'; }
  if(type==='a'){ text = currentAnswer?.en; btnId = 'btnListenA'; }
  if(!text) return;
  stopSpeech();
  const btn = document.getElementById(btnId);
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = 0.82; u.pitch = 1;
  const voices = window.speechSynthesis.getVoices();
  const brit = voices.find(v =>
    v.lang === 'en-GB' ||
    ['Daniel','Kate','Oliver','Serena'].some(n => v.name.includes(n))
  );
  if(brit) u.voice = brit;
  btn.classList.add('speaking');
  u.onend = u.onerror = () => btn.classList.remove('speaking');
  window.speechSynthesis.speak(u);
}

if('speechSynthesis' in window){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
init();
</script>
