document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"a757ad20-4d06-4d85-aba9-3a4af5723aa8\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\n*,*::before,*::after{box-sizing:border-box;}\nbody{margin:0;background:#06080d;}\nselect:focus{outline:none;}\n[data-lr-scroll]::-webkit-scrollbar{display:none;}\n@keyframes lr-rise{from{transform:translateY(12px);}to{transform:none;}}\n@keyframes lr-fade{from{transform:translateY(6px);}to{transform:none;}}\n@keyframes lr-pulse{from{opacity:1;}to{opacity:.4;}}\n@keyframes lr-pop{0%{transform:scale(.7);}55%{transform:scale(1.08);}100%{transform:scale(1);}}\n@keyframes lr-bump{0%{transform:scale(1);}40%{transform:scale(1.2);}100%{transform:scale(1);}}\n@keyframes lr-float{0%{opacity:0;transform:translateY(2px);}25%{opacity:1;}100%{opacity:0;transform:translateY(-26px);}}\n<\u002Fstyle>\n<script>\nwindow.LONDON_SCENARIOS = {\n  airport:{label:'Aeroporto / Imigração',icon:'✈️',color:'#c8102e',questions:[\n    {q:\"What is the purpose of your visit?\",pt:\"Qual é o motivo da sua visita?\",answers:[\n      {pt:\"Vou visitar meus filhos que moram em Londres.\",en:\"I'm visiting my children who live in London.\",ph:\"áim víziting mái tchíldren huu liv in lándon\"},\n      {pt:\"Vou visitar meus primos que moram aqui.\",en:\"I'm visiting my cousins who live here.\",ph:\"áim víziting mái cázins huu liv hír\"},\n      {pt:\"Vou visitar minha família em Londres.\",en:\"I'm visiting family in London.\",ph:\"áim víziting féimili in lándon\"},\n      {pt:\"Meus filhos são donos de um restaurante aqui.\",en:\"My children own a restaurant here.\",ph:\"mái tchíldren óun a réstront hír\"},\n      {pt:\"Meus parentes trabalham com restaurante e açougue aqui.\",en:\"My relatives run a restaurant and a butcher's here.\",ph:\"mái rélotivs rán a réstront and a bútcherz hír\"},\n      {pt:\"É uma visita familiar, meus filhos moram aqui.\",en:\"It's a family visit, my children live here.\",ph:\"its a féimili vízit, mái tchíldren liv hír\"},\n      {pt:\"Vim passar um tempo com minha família.\",en:\"I came to spend time with my family.\",ph:\"ái kêim tu spend táim with mái féimili\"},\n      {pt:\"Meus primos são residentes britânicos e me convidaram.\",en:\"My cousins are British residents and invited me.\",ph:\"mái cázins ar brítish rézidents and inváitid mi\"},\n      {pt:\"Visita de lazer e família.\",en:\"Leisure and family visit.\",ph:\"léjher and féimili vízit\"},\n      {pt:\"Vim conhecer melhor a cidade onde minha família vive.\",en:\"I came to explore the city where my family lives.\",ph:\"ái kêim tu ikspló dê síti uér mái féimili livz\"},\n    ]},\n    {q:\"How long are you planning to stay?\",pt:\"Por quanto tempo planeja ficar?\",answers:[\n      {pt:\"Vou ficar quinze dias.\",en:\"I'm planning to stay for fifteen days.\",ph:\"áim pláning tu stêi for fiftíin dêiz\"},\n      {pt:\"Vou ficar quarenta e cinco dias.\",en:\"I'm planning to stay for forty-five days.\",ph:\"áim pláning tu stêi for fórti fáiv dêiz\"},\n      {pt:\"Vou ficar três meses.\",en:\"I'm planning to stay for three months.\",ph:\"áim pláning tu stêi for thrí mánths\"},\n      {pt:\"Quinze dias, mas posso estender se precisar.\",en:\"Fifteen days, but I may extend if needed.\",ph:\"fiftíin dêiz, bat ái mêi iksténd if níidid\"},\n      {pt:\"Quarenta e cinco dias para visitar minha família.\",en:\"Forty-five days to visit my family.\",ph:\"fórti fáiv dêiz tu vízit mái féimili\"},\n      {pt:\"Três meses para ficar com meus filhos.\",en:\"Three months to stay with my children.\",ph:\"thrí mánths tu stêi with mái tchíldren\"},\n      {pt:\"Em torno de um mês e meio.\",en:\"Around a month and a half.\",ph:\"aráund a mánth and a haf\"},\n      {pt:\"Duas semanas, depois vejo se fico mais.\",en:\"Two weeks, then I'll see if I stay longer.\",ph:\"tuu uíiks, den áil síi if ái stêi lónger\"},\n      {pt:\"Ainda não sei ao certo, entre um 0 24 24\" fill=\"none\" stroke=\"#37C7B8\" stroke-width=\"2.4\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg>\n                {{ scoreLabel }}\n              <\u002Fdiv>\n              <div style=\"display:inline-flex;align-items:center;gap:7px;padding:10px 14px;border-radius:14px;background:rgba(255,201,74,0.12);border:1px solid rgba(255,201,74,0.3);font-size:14px;font-weight:700;color:#FFD98A;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"display:block;\"><path d=\"M13 2 3 14h7l-1 8 10-12h-7z\"><\u002Fpath><\u002Fsvg>\n                {{ xp }} XP\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"display:flex;gap:10px;width:100%;max-width:350px;\">\n              <button onclick=\"{{ onRestart }}\" style=\"{{ restartStyle }}\">\n                <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;\"><path d=\"M3 12a9 9 0 1 0 2.6-6.4L3 8\"><\u002Fpath><path d=\"M3 3v5h5\"><\u002Fpath><\u002Fsvg>\n                Repetir\n              <\u002Fbutton>\n              <button onclick=\"{{ onNextScene }}\" style=\"{{ nextSceneStyle }}\">\n                Próximo cenário\n                <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.1\" stroke-linecap=\"round\" stroke-linejoin=\"round\" style=\"display:block;\"><path d=\"M5 12h13\"><\u002Fpath><path d=\"m12 5 7 7-7 7\"><\u002Fpath><\u002Fsvg>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { ready:false, scene:null, idx:0, sel:'', revealed:false, done:false, speaking:null, xp:0, practiced:{}, gained:false };\n\n  ACCENTS = { airport:'#5B9BFF', daily:'#FFC94A', health:'#FF5C72', transport:'#37C7B8', restaurant:'#FF9A52' };\n  LS = 'londonready_progress_v1';\n\n  componentDidMount(){\n    let saved = {};\n    try { saved = JSON.parse(localStorage.getItem(this.LS) || '{}'); } catch(e){}\n    if (saved && (saved.xp || saved.practiced)) this.setState({ xp:saved.xp||0, practiced:saved.practiced||{} });\n\n    const grab = () => {\n      if (window.LONDON_SCENARIOS){\n        this.DATA = window.LONDON_SCENARIOS;\n        this.setState({ ready:true, scene: Object.keys(this.DATA)[0] });\n        return true;\n      }\n      return false;\n    };\n    if (!grab()) this._t = setInterval(()=>{ if (grab()) clearInterval(this._t); }, 30);\n\n    if ('speechSynthesis' in window){\n      try { window.speechSynthesis.getVoices(); window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices(); } catch(e){}\n    }\n    this._key = (e) => {\n      if (this.state.done || !this.state.ready) return;\n      if (e.key === 'ArrowRight') this.nav(1);\n      else if (e.key === 'ArrowLeft') this.nav(-1);\n    };\n    window.addEventListener('keydown', this._key);\n  }\n  componentWillUnmount(){\n    if (this._t) clearInterval(this._t);\n    if (this._g) clearTimeout(this._g);\n    if (this._key) window.removeEventListener('keydown', this._key);\n    this.stopSpeech();\n  }\n\n  hexA(hex, a){ const n = parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }\n  lighten(hex, amt){ const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255; r=Math.round(r+(255-r)*amt); g=Math.round(g+(255-g)*amt); b=Math.round(b+(255-b)*amt); return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1); }\n\n  icon(name, size, sw){\n    const e = React.createElement;\n    const sz = size || 18, w = sw || 1.9;\n    let kids = [], fill = false;\n    switch(name){\n      case 'plane': kids=[e('path',{key:0,d:'M17.8 19.2 16 11l3.5-3.5c1-1 1-2.6 0-3.5s-2.5-1-3.5 0L12.5 7.5 4.4 5.7c-.4-.1-.7.4-.4.7l3.1 3.6-2 2-1.6-.4c-.3-.1-.6.3-.4.6l1.9 1.9 1.9 1.9c.3.2.7-.1.6-.4l-.4-1.6 2-2 3.6 3.1c.3.3.8 0 .7-.4z'})]; break;\n      case 'cart': kids=[e('circle',{key:0,cx:9,cy:20,r:1.3}),e('circle',{key:1,cx:18,cy:20,r:1.3}),e('path',{key:2,d:'M2 3h2l2.6 12.4c.2.9 1 1.6 2 1.6h9.8c1 0 1.8-.7 1.9-1.6L22 7H6'})]; break;\n      case 'health': kids=[e('path',{key:0,d:'M20 14c1.4-1.5 2-3 2-4.7A4.8 4.8 0 0 0 17.2 4.5c-1.7 0-3 .8-4.2 2.1l-1 .9-1-.9C9.8 5.3 8.5 4.5 6.8 4.5A4.8 4.8 0 0 0 2 9.3c0 1.7.6 3.2 2 4.7l8 8z'}),e('path',{key:1,d:'M2.6 12.5h5l1.4-3 2.5 6 2-8 1.7 5h5.2'})]; break;\n      case 'train': kids=[e('rect',{key:0,x:4,y:3,width:16,height:14,rx:3}),e('path',{key:1,d:'M4 11h16'}),e('path',{key:2,d:'M12 3v8'}),e('path',{key:3,d:'m7 17-2 4'}),e('path',{key:4,d:'m17 21-2-4'}),e('circle',{key:5,cx:8.5,cy:14,r:0.7,fill:'currentColor',stroke:'none'}),e('circle',{key:6,cx:15.5,cy:14,r:0.7,fill:'currentColor',stroke:'none'})]; break;\n      case 'coffee': kids=[e('path',{key:0,d:'M16 8h1.5a3 3 0 0 1 0 6H16'}),e('path',{key:1,d:'M3 8h13v6a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z'}),e('path',{key:2,d:'M6 2v2.4'}),e('path',{key:3,d:'M10 2v2.4'}),e('path',{key:4,d:'M14 2v2.4'})]; break;\n      default: kids=[];\n    }\n    return e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:fill?'currentColor':'none',stroke:fill?'none':'currentColor',strokeWidth:w,strokeLinecap:'round',strokeLinejoin:'round','aria-hidden':true,style:{display:'block',flex:'none'}}, kids);\n  }\n  SCENE_ICON = { airport:'plane', daily:'cart', health:'health', transport:'train', restaurant:'coffee' };\n\n  cur(){ return this.DATA[this.state.scene]; }\n  curQ(){ return this.cur().questions[this.state.idx]; }\n  curAns(){ const s = this.state.sel; return s === '' ? null : this.curQ().answers[parseInt(s)]; }\n\n  stopSpeech(){ if ('speechSynthesis' in window) window.speechSynthesis.cancel(); }\n  speak(text, which){\n    if (!('speechSynthesis' in window) || !text) return;\n    this.stopSpeech();\n    const u = new SpeechSynthesisUtterance(text);\n    u.lang = 'en-GB'; u.rate = 1.0; u.pitch = 1;\n    const voices = window.speechSynthesis.getVoices();\n    const kate = voices.find(v => v.name.includes('Kate'))\n      || voices.find(v => v.lang === 'en-GB' && /female|kate|serena|stephanie/i.test(v.name))\n      || voices.find(v => v.lang === 'en-GB');\n    if (kate) u.voice = kate;\n    u.onend = u.onerror = () => { if (this.state.speaking === which) this.setState({ speaking:null }); };\n    this.setState({ speaking:which });\n    window.speechSynthesis.speak(u);\n  }\n\n  practice(){\n    const key = this.state.scene + ':' + this.state.idx;\n    if (this.state.practiced[key]) return;\n    const practiced = Object.assign({}, this.state.practiced, { [key]:true });\n    const xp = this.state.xp + 10;\n    this.setState({ practiced, xp, gained:true });\n    try { localStorage.setItem(this.LS, JSON.stringify({ xp, practiced })); } catch(e){}\n    if (this._g) clearTimeout(this._g);\n    this._g = setTimeout(()=>this.setState({ gained:false }), 820);\n  }\n\n  selectScene(k){ this.stopSpeech(); this.setState({ scene:k, idx:0, sel:'', revealed:false, done:false, speaking:null }); }\n  nextScene(){ const keys = Object.keys(this.DATA); const i = keys.indexOf(this.state.scene); this.selectScene(keys[(i+1) % keys.length]); }\n  onSelect(e){ this.setState({ sel:e.target.value, revealed:false }); }\n  confirm(){ const a = this.curAns(); if (!a) return; this.setState({ revealed:true }); this.practice(); setTimeout(()=>this.speak(a.en,'a'), 280); }\n  jumpTo(i){ this.stopSpeech(); this.setState({ idx:i, sel:'', revealed:false, speaking:null }); }\n  nav(dir){\n    this.stopSpeech();\n    const total = this.cur().questions.length;\n    const next = this.state.idx + dir;\n    if (next >= total){ this.setState({ done:true, speaking:null }); return; }\n    if (next < 0) return;\n    this.setState({ idx:next, sel:'', revealed:false, speaking:null });\n    window.scrollTo({ top:0, behavior:'smooth' });\n  }\n  restart(){ this.setState({ idx:0, sel:'', revealed:false, done:false }); }\n\n  renderVals(){\n    const base = { ready:this.state.ready, xp:this.state.xp, gained:this.state.gained };\n    base.xpPillStyle = `display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;background:rgba(255,201,74,0.13);border:1px solid rgba(255,201,74,0.32);color:#FFD98A;font-size:14px;font-weight:700;${this.state.gained?'animation:lr-bump .5s ease;':''}`;\n    if (!this.state.ready) return base;\n\n    const { scene, idx, sel, revealed, done, speaking, practiced } = this.state;\n    const data = this.DATA;\n    const accent = this.ACCENTS[scene] || '#5B9BFF';\n    const accentLt = this.lighten(accent, 0.28);\n    const grad = `linear-gradient(135deg,${this.lighten(accent,0.16)},${accent})`;\n    const s = data[scene];\n    const total = s.questions.length;\n    const q = s.questions[idx];\n    const a = sel === '' ? null : q.answers[parseInt(sel)];\n\n    const tabBase = 'flex:none;display:inline-flex;align-items:center;gap:7px;border-radius:13px;padding:9px 14px;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all .22s;';\n    const scenes = Object.keys(data).map(k => {\n      const c = this.ACCENTS[k] || '#5B9BFF';\n      const active = k === scene;\n      return {\n        key:k,\n        shortLabel: data[k].label.split('/')[0].trim(),\n        icon: this.icon(this.SCENE_ICON[k], 17, 1.9),\n        onClick: () => this.selectScene(k),\n        style: tabBase + (active\n          ? `background:${this.lighten(c,0.05)};color:#0b1020;border:1px solid ${this.hexA(c,0.6)};box-shadow:0 6px 18px ${this.hexA(c,0.45)};`\n          : 'background:rgba(255,255,255,0.06);color:#aebbd8;border:1px solid rgba(255,255,255,0.09);')\n      };\n    });\n\n    const segs = s.questions.map((_, i) => {\n      const done_i = !!practiced[scene + ':' + i];\n      const isCur = i === idx;\n      let st = 'flex:1;height:6px;border-radius:99px;border:none;padding:0;cursor:pointer;transition:all .3s;';\n      if (isCur) st += `background:${accent};box-shadow:0 0 12px ${this.hexA(accent,0.65)};`;\n      else if (done_i) st += `background:${this.hexA(accent,0.8)};`;\n      else st += 'background:rgba(255,255,255,0.12);';\n      return { style: st, onClick: () => this.jumpTo(i) };\n    });\n\n    const pulse = 'animation:lr-pulse .8s ease-in-out infinite alternate;';\n    const score = Object.keys(practiced).filter(k => k.indexOf(scene + ':') === 0).length;\n\n    return Object.assign(base, {\n      scenes,\n      segs,\n      progressLabel: `${idx+1} / ${total}`,\n      catLabel: s.label,\n      catIcon: this.icon(this.SCENE_ICON[scene], 15, 2),\n      catPillStyle: `display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;background:${this.hexA(accent,0.14)};border:1px solid ${this.hexA(accent,0.32)};color:${accentLt};font-size:13px;font-weight:700;letter-spacing:-0.01em;`,\n      qEn: q.q,\n      qPt: q.pt,\n      onSpeakQ: () => this.speak(q.q, 'q'),\n      speakQStyle: `width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.13);color:${accentLt};cursor:pointer;flex:none;transition:all .2s;${speaking==='q'?pulse:''}`,\n      options: q.answers.map((an,i) => ({ value:String(i), label:an.pt })),\n      selectedValue: sel,\n      onSelect: (e) => this.onSelect(e),\n      showConfirm: !revealed,\n      confirmDisabled: sel === '',\n      onConfirm: () => this.confirm(),\n      confirmStyle: `width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:${sel===''?'rgba(255,255,255,0.08)':grad};color:${sel===''?'#6b7ba0':'#0b1020'};border:none;border-radius:14px;padding:15px;font-size:16px;font-weight:700;font-family:inherit;letter-spacing:-0.01em;cursor:${sel===''?'not-allowed':'pointer'};box-shadow:${sel===''?'none':`0 10px 26px ${this.hexA(accent,0.34)}`};transition:all .22s;`,\n      revealed,\n      rPt: a ? a.pt : '',\n      rEn: a ? a.en : '',\n      rPhonetic: a ? a.ph : '',\n      revealEnLabelStyle: `font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:${accentLt};`,\n      revealBoxStyle: `background:linear-gradient(160deg,${this.hexA(accent,0.17)},rgba(255,255,255,0.04));border:1px solid ${this.hexA(accent,0.32)};border-radius:18px;padding:18px;margin-top:6px;box-shadow:0 18px 44px -26px ${this.hexA(accent,0.7)},inset 0 1px 0 rgba(255,255,255,0.12);animation:lr-rise .38s cubic-bezier(.22,1,.36,1);`,\n      onSpeakA: () => { const an = this.curAns(); if (an) this.speak(an.en, 'a'); },\n      speakAStyle: `display:inline-flex;align-items:center;gap:8px;background:${accent};color:#0b1020;border:none;border-radius:12px;padding:11px 18px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 20px ${this.hexA(accent,0.4)};${speaking==='a'?pulse:''}`,\n      showCard: !done,\n      done,\n      firstQ: idx === 0,\n      onPrev: () => this.nav(-1),\n      onNext: () => this.nav(1),\n      nextLabel: idx === total-1 ? 'Finalizar' : 'Próxima',\n      prevStyle: `width:48px;height:48px;flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:${idx===0?'#3c486a':'#cdd8f0'};cursor:${idx===0?'not-allowed':'pointer'};transition:all .2s;`,\n      nextStyle: `flex:1;display:flex;align-items:center;justify-content:center;gap:8px;height:48px;border-radius:14px;background:${grad};color:#0b1020;border:none;font-size:16px;font-weight:700;font-family:inherit;letter-spacing:-0.01em;cursor:pointer;box-shadow:0 8px 22px ${this.hexA(accent,0.35)};`,\n      doneScene: s.label,\n      scoreLabel: `${score}/${total} frases`,\n      onRestart: () => this.restart(),\n      onNextScene: () => this.nextScene(),\n      restartStyle: `flex:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px 18px;border-radius:14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.13);color:#dbe4f7;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .2s;`,\n      nextSceneStyle: `flex:1;display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:14px;background:${grad};color:#0b1020;border:none;font-size:15px;font-weight:700;font-family:inherit;letter-spacing:-0.01em;cursor:pointer;box-shadow:0 9px 24px ${this.hexA(accent,0.35)};`,\n      doneCircleStyle: `width:92px;height:92px;border-radius:50%;background:${grad};color:#0b1020;display:flex;align-items:center;justify-content:center;box-shadow:0 18px 46px ${this.hexA(accent,0.45)},inset 0 2px 0 rgba(255,255,255,0.35);animation:lr-pop .5s cubic-bezier(.34,1.56,.64,1);`\n    });\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
